<!DOCTYPE html>

<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>

.dashboard-nav{
display:flex;
justify-content:center;
gap:40px;
padding:20px;
background:rgba(0,0,0,0.6);
position:relative;
}

.dashboard-nav a{
text-decoration:none;
color:white;
text-align:center;
font-size:14px;
}

.dashboard-nav img{
width:50px;
display:block;
margin:auto;
}

/* Profile dropdown */

.profile-menu{
position:relative;
}

.dropdown{
display:none;
position:absolute;
top:70px;
background:white;
color:black;
padding:10px;
border-radius:5px;
}

.dropdown a{
display:block;
text-decoration:none;
color:black;
padding:5px;
}

.profile-menu:hover .dropdown{
display:block;
}

/* Dashboard content */

.dashboard-content{
text-align:center;
margin-top:80px;
}

.career-box{
background:white;
color:black;
width:300px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>
