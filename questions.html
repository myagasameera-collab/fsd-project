<!DOCTYPE html>
<html>
<head>
<title>Career Questions</title>
<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:url("https://lh3.googleusercontent.com/gg-dl/AOI_d_9PP-OLinmxv_k90UR--ayW-rNjGMAI5Sph6f5Qiz6Tacq37gGVS5F7WK2rKdle7mUA67k4bSCSiKoV_6zVDFI6bgl7qCrg2caYRq-r9Lwbd9nDV0ClU9RzhlFtFeMcy8HlmhYNfelB4WxlSp7jjB0Ax8IaY-5C-I-uQ4x5ly_tHe5Ofw=s1600-rj;
background-size:cover;  
}

.question-box{
background:white;
color:black;
padding:40px;
width:400px;
text-align:center;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button{
margin-top:20px;
padding:10px 20px;
background:#2c5364;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
#options label {
  display: block;          /* Each option on its own line */
  text-align: left;        /* Align text to the left */
  margin: 8px 0;           /* Space between options */
  font-size: 16px;         /* Adjust text size */
  cursor: pointer;         /* Make labels clickable */
}

#options input[type="radio"] {
  margin-right: 10px;      /* Space between radio and text */
  vertical-align: middle;  /* Align radio with text */
}
</style>

</head>

<body>

<div class="question-box">

<h2 id="questionText">Question will appear here</h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

<script src="questions.js"></script>

</body>

</html>
