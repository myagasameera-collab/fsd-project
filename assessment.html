<!DOCTYPE html>
<html>
<head>
<title>Career Assessment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;margin-top:40px;">
Career Assessment
</h1>

<div class="login-box">

<form id="assessmentForm">

<label>1. Which field interests you?</label>
<select id="interest">
<option>AI / Data Science</option>
<option>Web Development</option>
<option>Cyber Security</option>
<option>App Development</option>
</select>

<br><br>

<label>2. Which language do you know?</label>
<select id="language">
<option>Python</option>
<option>Java</option>
<option>C++</option>
<option>None</option>
</select>

<br><br>

<label>3. What type of work do you enjoy?</label>
<select id="work">
<option>Problem Solving</option>
<option>Designing</option>
<option>Data Analysis</option>
<option>Security Testing</option>
</select>

<br><br>

<label>4. Do you have project experience?</label>
<select id="experience">
<option>Yes</option>
<option>Beginner</option>
<option>No</option>
</select>

<br><br>

<label>5. What is your career goal?</label>
<select id="goal">
<option>AI Engineer</option>
<option>Web Developer</option>
<option>Cyber Security Analyst</option>
<option>App Developer</option>
</select>

<br><br>

<button type="submit">Submit</button>

</form>

</div>

<script src="assessment.js"></script>

</body>
</html>
